body:
  text: 三藏金剛智奉詔譯如是我聞一時佛在舍衛國迦蘭竹林園大說法愍念一切眾生說此陀羅尼屬金色迦那鉢底爾時世尊即說真言曰曩謨率都底一迦吒迦吒二底吒摩吒三起哩二合亹拏二合四起哩二合亹拏二合五畔惹畔惹二合六曩謨率都帝七護嚕捺八跛惹尼曳九娑縛賀十阿部多十一浪拏乞懺二合質多十二曷羅引娑摩誐磋底丁以反十三摩訶野十四摩賀悉底二合十五諾乞二合曩十六鉢羅二合句跛野引弭引十七矩嚕矩嚕十八祖嚕祖嚕十九謨嚕謨嚕二十曩謨曩謨二十一佛告舍利弗此是金色迦那鉢底除障難真言若眾生受持真言者所作諸法無不成大驗當知定有障難即於白月若黑月二日八日十五日牛糞塗地作壇種種供養所作成就金色迦那鉢底白佛言我當擁護持此真言者若有眾生持此真言者某人所須資財臥具衣服飲食金銀珍寶奴婢從不舊乏少一切真言法速令成所作就如意其像形人身象頭六臂於白㲲上畫之刻作用得白檀紫檀苦練木通用餘木不得若綵色勿用皮膠須用香汁及有汁木其身正立鼻向右曲左上手把刀次手把歡喜團下手把劍棒次手把縛折羅下手把索身作金色脚蹈金山頭上五色雲雲內有四天王及諸仙散華左邊有俱摩羅淨軍右邊有阿吒薄俱元率大將向下左畫美女音樂供養立右畫四大藥叉各執器仗一半頭一猪頭一象頭一馬頭皆著虎皮褌作像之時莫令見雜人等書畢燒香清淨不食五辛於淨室中安置其壇方圓大小隨意作之壇中燒安悉香白膠沈水香等用隨餅乳粥歡喜團蘇蜜菓子種種供養所作隨心若鬼神難調伏者搓白線呪之一遍一結滿四十九結繫左臂一切鬼悉皆被縛一受持人不須邪婬妄語作誑其禁食已止芸薹葫荽五辛不得食故入色孝家生產處印法并通用諸毘那翼迦法通用勿親惡人同行者施之無妨
